<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: transparent;
      padding: 6px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    .container {
      background: rgba(24, 24, 32, 0.94);
      border-radius: 14px;
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.10),
        0 8px 32px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-icon {
      font-size: 15px;
      line-height: 1;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.2px;
    }
    .header-time {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      font-variant-numeric: tabular-nums;
    }

    /* Divider */
    .divider {
      height: 0.5px;
      background: rgba(255,255,255,0.08);
      margin: 0 12px;
    }

    /* Section label */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 10px 16px 4px;
    }

    /* Rows */
    .row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      border-top: 0.5px solid rgba(255,255,255,0.05);
    }
    .row:first-of-type { border-top: none; }

    .row-icon {
      font-size: 13px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      color: rgba(255,255,255,0.5);
    }
    .row-icon.green { color: #34c759; }
    .row-icon.indigo { color: #7b7aff; }

    .row-info { flex: 1; min-width: 0; }
    .row-name {
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(255,255,255,0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-meta {
      font-size: 10.5px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    /* Action buttons */
    .action-btn {
      border: none;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transition: opacity 0.1s;
    }
    .action-btn:hover { opacity: 0.8; }
    .action-btn:disabled { opacity: 0.35; cursor: default; }

    .btn-green  { background: rgba(52,199,89,0.18);  color: #34c759; }
    .btn-red    { background: rgba(255,59,48,0.14);   color: #ff453a; }
    .btn-done   { background: rgba(52,199,89,0.12);   color: #34c759; cursor: default; }
    .btn-indigo { background: rgba(123,122,255,0.18); color: #7b7aff; }

    /* Empty state */
    .empty {
      padding: 18px 16px;
      text-align: center;
    }
    .empty-text {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 10px;
    }
    .footer-btn {
      background: none;
      border: none;
      font-size: 11.5px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-family: inherit;
      padding: 3px 6px;
      border-radius: 5px;
      transition: background 0.1s, color 0.1s;
    }
    .footer-btn:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
    }
    .footer-btn.active {
      color: #7b7aff;
    }

    /* Setup / onboarding */
    .setup-body {
      padding: 16px;
    }
    .setup-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      margin-bottom: 3px;
    }
    .setup-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }
    .setup-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      color: rgba(255,255,255,0.88);
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: text;
      -webkit-user-select: text;
    }
    .setup-input::placeholder { color: rgba(255,255,255,0.22); }
    .setup-input:focus {
      border-color: rgba(123,122,255,0.6);
      box-shadow: 0 0 0 2.5px rgba(123,122,255,0.18);
    }
    .primary-btn {
      width: 100%;
      background: #5e5ce6;
      border: none;
      border-radius: 8px;
      padding: 7px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.12s;
    }
    .primary-btn:hover { opacity: 0.88; }
    .primary-btn:disabled { opacity: 0.35; cursor: default; }

    .error-msg {
      font-size: 10.5px;
      color: #ff453a;
      margin-top: 6px;
      text-align: center;
    }

    /* Back link */
    .back-btn {
      background: none;
      border: none;
      font-size: 11.5px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 0;
      margin-bottom: 10px;
      font-family: inherit;
    }
    .back-btn:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="container" id="root"></div>
  <script src="renderer.js"></script>
</body>
</html>
