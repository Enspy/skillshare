name = "skillshare-cc"
main = "src/index.js"
compatibility_date = "2024-01-01"

# After running `wrangler kv:namespace create USERS` and `wrangler kv:namespace create INBOX`,
# paste the generated IDs below.

[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_USERS_KV_ID"
preview_id = "REPLACE_WITH_USERS_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "INBOX"
id = "REPLACE_WITH_INBOX_KV_ID"
preview_id = "REPLACE_WITH_INBOX_KV_PREVIEW_ID"
